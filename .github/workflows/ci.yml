name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        type: choice
        default: 'auto'
        options:
          - auto        # Deploy based on changed files
          - app-only    # Deploy only the Astro app
          - cms-only    # Deploy only the CMS (triggers Render)
          - both        # Deploy both app and CMS

permissions:
  contents: read

concurrency:
  group: 'pages-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # Determine what needs to be deployed based on changed files or manual input
  determine-targets:
    name: Determine Deploy Targets
    runs-on: ubuntu-latest
    outputs:
      deploy_app: ${{ steps.decide.outputs.deploy_app }}
      deploy_cms: ${{ steps.decide.outputs.deploy_cms }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No fetch-depth override: paths-filter computes its own base
        # (for push it diffs against github.event.before / the pushed range,
        #  which is correct for squash & rebase merges, unlike HEAD~1).

      - name: Detect changed paths
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            app:
              - 'app/**'
            cms:
              - 'cms/**'

      - name: Decide deploy targets
        id: decide
        run: |
          set -euo pipefail
          deploy_app=false
          deploy_cms=false

          case "${{ github.event_name }}" in
            pull_request)
              # PRs never deploy.
              ;;
            workflow_dispatch)
              case "${{ inputs.deploy_target }}" in
                app-only) deploy_app=true ;;
                cms-only) deploy_cms=true ;;
                both)     deploy_app=true; deploy_cms=true ;;
                auto|*)
                  # Manual auto has no diff context; deploy app on green,
                  # leave cms to an explicit choice.
                  deploy_app=true
                  ;;
              esac
              ;;
            push)
              # Deploy-on-green: always (re)deploy the app on a push to main.
              deploy_app=true
              # CMS only when cms/ changed in the pushed range.
              if [[ "${{ steps.filter.outputs.cms }}" == "true" ]]; then
                deploy_cms=true
              fi
              ;;
          esac

          echo "deploy_app=$deploy_app" >> "$GITHUB_OUTPUT"
          echo "deploy_cms=$deploy_cms" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy targets: app=$deploy_app cms=$deploy_cms"

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -w app

      - name: Run TypeScript check
        run: npm run typecheck -w app

      - name: Check migration drift (CMS)
        run: npm run migrate:check -w cms

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -w app

      - name: Run CMS unit tests
        run: npm run test -w cms

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site (with test fixtures)
        run: npm run build -w app
        env:
          USE_TEST_FIXTURES: 'true'
          # PUBLIC_CMS_URL must be non-empty so the contact form script is compiled
          # with a POST target. The actual request is intercepted by Playwright route
          # interception in the contact spec, so no live CMS is needed.
          PUBLIC_CMS_URL: 'http://localhost:3000'
          # Cloudflare Turnstile always-pass test site key — inlined at build time
          # so the widget div renders with a data-sitekey attribute and the form
          # script compiles correctly. The real Turnstile api.js is intercepted by
          # Playwright in the contact spec, so no Cloudflare network call is made.
          PUBLIC_TURNSTILE_SITE_KEY: '1x00000000000000000000AA'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-app:
    name: Deploy App to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    needs: [determine-targets, lint-and-typecheck, unit-tests, e2e-tests]
    if: |
      needs.determine-targets.outputs.deploy_app == 'true' &&
      github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check CMS availability
        id: cms-check
        run: |
          set -uo pipefail
          available=false
          if [[ -n "${{ secrets.CMS_URL }}" ]]; then
            # Render free-tier cold start can take ~30-60s; retry a few times.
            # ~5 attempts x (10s per-attempt cap + 15s sleep) => hard ceiling < ~3min.
            for attempt in 1 2 3 4 5; do
              if curl -sf "${{ secrets.CMS_URL }}/api/health" --max-time 10 >/dev/null 2>&1; then
                echo "CMS is available (attempt $attempt)"
                available=true
                break
              fi
              echo "CMS not ready (attempt $attempt/5) - retrying in 15s..."
              sleep 15
            done || available=false
            [[ "$available" == "true" ]] || echo "CMS is NOT available after retries - will use seed data fallback"
          else
            echo "CMS_URL not configured - will use seed data fallback"
          fi
          echo "available=$available" >> "$GITHUB_OUTPUT"

      - name: Generate fallback data from seeds
        if: steps.cms-check.outputs.available == 'false'
        run: |
          echo "Seeding local SQLite database and exporting dump..."
          # Create cms/data directory for local SQLite database
          mkdir -p cms/data
          # Create data directory at project root for cms-dump.json export
          mkdir -p data
          # Use local SQLite (no Turso) - starts empty, no reset needed
          # Apply schema from committed migrations first (push:false means getPayload
          # no longer auto-creates schema, so the seed would fail on a blank DB without this)
          npm run payload -w cms -- migrate --force-accept-warning
          npm run seed -w cms
          npm run db:export -w cms
          # Verify the dump was created
          if [ -f "data/cms-dump.json" ]; then
            echo "✓ Dump generated at data/cms-dump.json"
            echo "  Contents preview:"
            head -20 data/cms-dump.json
          else
            echo "✗ ERROR: cms-dump.json was not created!"
            exit 1
          fi

      - name: Build site
        run: npm run build -w app
        env:
          BASE_PATH: ${{ vars.BASE_PATH || '/tunadao-public-site/' }}
          SITE_URL: ${{ vars.SITE_URL || 'https://www.loureiro.me' }}
          CMS_URL: ${{ steps.cms-check.outputs.available == 'true' && secrets.CMS_URL || '' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-cms:
    name: Deploy CMS (Render)
    runs-on: ubuntu-latest
    needs: [determine-targets, lint-and-typecheck, unit-tests, e2e-tests]
    if: |
      needs.determine-targets.outputs.deploy_cms == 'true' &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: |
          if [[ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]]; then
            echo "Triggering Render deploy..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL not configured - skipping CMS deploy"
            echo "To enable: add RENDER_DEPLOY_HOOK_URL secret from Render dashboard"
          fi
