services:
  - type: web
    name: tunadao-cms
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run payload -w cms -- migrate --force-accept-warning && npm run start
    plan: free
    healthCheckPath: /admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYLOAD_PUBLIC_SERVER_URL
        sync: false
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      # Turso Database
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # Cloudinary Storage
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Schema push safety (must be disabled in production)
      - key: PAYLOAD_DISABLE_PUSH
        value: "true"
      # Contact
      - key: CONTACT_EMAIL
        sync: false
      # GitHub (for automatic frontend rebuilds)
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_WORKFLOW_FILE
        value: "ci.yml"
      - key: GITHUB_REF
        value: "main"
      # Cloudinary Upload Widget (client-side)
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET
        sync: false
      # Optional
      - key: RESEND_API_KEY
        sync: false
